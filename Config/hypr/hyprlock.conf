

$font = Monospace

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    path = ~/Downloads/images/uagami-cherry-blossoms.jpg
    # blur_passes = 2
    # blur_size = 2
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
   
    position = 0, 200
    halign = center
    valign = bottom

    outer_color = rgb(33ccff) rgb(00ff99) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 45deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg
    inner_color = rgba(199, 199, 199, 0.5)

    font_color = rgb(69, 69, 69)
    fade_on_empty = false
    rounding = 5
    blur_passes = 2

    font_family = $font
    placeholder_text = Password
    fail_text = $PAMFAIL

    dots_spacing = 0.3

}

# TIME
label {
    monitor =
    text = $TIME12 # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 50
    font_family = $font

    position = 0, 200
    halign = center
    valign = center
}

