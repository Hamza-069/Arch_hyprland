

$font = Nunito ExtraBold

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    path = ~/Downloads/images/craig-nacroix-mountains.jpg
    # blur_passes = 2
    # blur_size = 2
    fit_mode = cover 
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
   
    position = 0, 200
    halign = center
    valign = bottom

    outer_color = rgb(33ccff) rgb(00ff99) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 90deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg
    inner_color = rgba(69, 69, 69, 0.3)
    shadow_passes = 1
    shadow_size = 5

    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    rounding = 5

    font_family = Nunito Semibold
    placeholder_text = Password
    fail_text = 🖕 What The Fuck 🖕

    dots_spacing = 0.3

}

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 60
    font_family = $font

    position = 0, 200
    halign = center
    valign = center
}

