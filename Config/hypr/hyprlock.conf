$mono = JetBrainsMono Nerd Font Mono

general {
    hide_cursor = true
    grace = 5
    no_fade_in = false
    fade_in_time = 0.3
}

animations {
    enabled = true
}

background {
    monitor =
    path = screenshot
    color = rgba(25, 23, 36, 1.0)      # Base
    blur_passes = 2
    blur_size = 2
    brightness = 0.35
}

shape {
    monitor =
    size = 600, 400
    color = rgba(25, 23, 36, 0.9)      # Base
    rounding = 8
    border_size = 2
    border_color = rgba(156, 207, 216, 1.0)  # Foam
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 200, 40
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.35
    dots_center = true

    outer_color = rgba(156, 207, 216, 0.6)   # Foam
    inner_color = rgba(38, 35, 58, 0.8)      # Surface
    font_color = rgb(224, 222, 244)          # Text
    fade_on_empty = false
    rounding = 3
    placeholder_text =
    check_text =   authenticating...
    check_color = rgba(49, 116, 143, 0.5)    # Pine
    fail_text =   try again
    fail_color = rgba(235, 111, 146, 0.5)    # Love
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%I:%M')"
    color = rgb(196, 167, 231)              # Iris
    font_size = 58
    font_family = $mono
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%a %b %d')"
    color = rgb(246, 193, 119)              # Gold
    font_size = 16
    font_family = $mono
    position = 0, 25
    halign = center
    valign = center
}
