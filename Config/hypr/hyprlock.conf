$mono = JetBrainsMono Nerd Font Mono

general {
    hide_cursor = true
    grace = 5
    no_fade_in = false
    fade_in_time = 0.3
}

animations {
    enabled = true
}

background {
    monitor =
    path = screenshot
    color = rgba(46, 52, 64, 1.0)
    blur_passes = 2
    blur_size = 2
    brightness = 0.7
    contrast = 0.9
}

shape {
    monitor =
    size = 600, 400
    color = rgba(46, 52, 64, 0.9)
    rounding = 8
    border_size = 1
    border_color = rgba(76, 86, 106, 1)
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 200, 40
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.35
    dots_center = true

    outer_color = rgba(94, 129, 172, 0.6)
    inner_color = rgba(46, 52, 64, 0.8)
    font_color = rgb(216, 222, 233)
    fade_on_empty = false
    rounding = 3
    placeholder_text = 
    check_text =   authenticating...
    check_color = rgba(163, 190, 140, 0.4)
    fail_text =   try again
    fail_color = rgba(191, 97, 106, 0.4)
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%I:%M')"
    color = rgb(136, 192, 208)
    font_size = 58
    font_family = $mono
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%a %b %d')"
    color = rgb(129, 161, 193)
    font_size = 16
    font_family = $mono
    position = 0, 25
    halign = center
    valign = center
}
