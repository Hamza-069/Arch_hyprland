# Font
font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
font_size 9

# Window look
background_opacity 0.3
window_padding_width 1

# Cursor
cursor_shape beam
cursor_blink_interval 0.5
# Scrollback
scrollback_lines 20000
cursor_trail 3
# cursor_trail_decay 2

# Disable bell
enable_audio_bell no

# Selection
copy_on_select yes

#Run a cmd on launch
#shell fish -lc 'fastfetch; exec fish'

# Performance
repaint_delay 10
input_delay 3
confirm_os_window_close  0
sync_to_monitor no

# Keybinds
map ctrl+shift+c copy_to_clipboard
map ctrl+v paste_from_clipboard



# BEGIN_KITTY_THEME
# Everforest Dark Medium
include current-theme.conf
# END_KITTY_THEME
